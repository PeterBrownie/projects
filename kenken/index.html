<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KenKen</title>
  <style>
    html, body {
      overflow: hidden;
    }
    *, *::before, *::after {
      box-sizing: border-box;
    }
    :root {
      --bg: #1e1e2e;
      --cell-bg: #2a2a3e;
      --text: #e0e0e0;
      --border: #444;
      --highlight: #3a3a5e;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
    }

    /* ── Header ── */
    header {
      width: 100%;
      height: 52px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #22223a;
      border-bottom: 1px solid #30304a;
      flex-shrink: 0;
    }
    .hdr-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .hdr-sep {
      width: 1px;
      height: 22px;
      background: #35355a;
      margin: 0 6px;
      flex-shrink: 0;
    }
    .hdr-title {
      font-size: 1rem;
      font-weight: 700;
      color: #b0b0d0;
      letter-spacing: 0.08em;
      padding-right: 4px;
    }
    .back-btn {
      color: #707090;
      text-decoration: none;
      font-size: 1.1rem;
      line-height: 1;
      padding: 5px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .back-btn:hover {
      color: #ccc;
      background: #2e2e4e;
    }
    header select {
      padding: 4px 8px;
      border: 1px solid #38385a;
      border-radius: 6px;
      background: #282840;
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }
    header select:hover {
      border-color: #50508a;
    }
    header button {
      padding: 4px 11px;
      border: 1px solid #38385a;
      border-radius: 6px;
      background: #282840;
      color: #b8b8d8;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
      line-height: 1.5;
    }
    header button:hover {
      background: #30305a;
      border-color: #55557a;
      color: #e0e0ff;
    }
    header button:disabled {
      opacity: 0.3;
      cursor: default;
    }
    header button.btn-active {
      background: #3c3c6e;
      border-color: #6060a0;
      color: #d0d0ff;
    }
    .hdr-spacer {
      flex: 1;
    }
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .progress-bar-track {
      width: 80px;
      height: 4px;
      background: #2e2e4e;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #6060a0;
      border-radius: 2px;
      transition: width 0.3s ease, background 0.3s ease;
      width: 0%;
    }
    .progress-bar-fill.complete {
      background: #50c050;
    }
    .progress-label {
      font-size: 0.78rem;
      color: #666;
      font-variant-numeric: tabular-nums;
      min-width: 36px;
      text-align: right;
    }

    /* ── Board (unchanged from original) ── */
    #board {
      display: grid;
      margin-top: 1rem;
      background: var(--bg);
      position: relative;
    }
    .cell {
      position: relative;
      z-index: 0;
      background: var(--cell-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
    }
    .cell, .cell * {
      cursor: default !important;
    }
    .cell input {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      color: #000;
      font-size: 1.2rem;
      text-align: center;
      caret-color: transparent;
    }
    ::-webkit-outer-spin-button,
    ::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
      appearance: textfield;
    }
    .cell input:focus {
      outline: none;
    }
    .cage-label {
      position: absolute;
      top: 2px;
      left: 2px;
      font-size: 0.8rem;
      font-weight: bold;
      color: #111;
    }
    .candidates {
      position: absolute;
      bottom: 2px;
      right: 2px;
      font-size: 0.6rem;
      color: #000;
    }
    .cell.selected {
      z-index: 1;
      outline: 2px solid white;
      outline-offset: -2px;
      border-radius: 2px;
    }
    /* Wrong cell highlight (replaces alert) */
    .cell.wrong {
      z-index: 2;
      outline: 2.5px solid #ff5555 !important;
      outline-offset: -2px;
    }

    /* ── Number pad ── */
    #numpad {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .num-btn {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      border: 1px solid #38385a;
      background: #282840;
      color: #b8b8d8;
      font-size: 1.1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      user-select: none;
    }
    .num-btn:hover {
      background: #30305a;
      border-color: #5555a0;
      color: #e0e0ff;
    }

    /* Individual candidate spans — always bold so highlighting never shifts layout */
    .candidates span {
      font-weight: bold;
    }
    .candidates span.cand-lit {
      color: #ff4444;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #252542;
      border: 1px solid #44447a;
      color: #d0d0f8;
      padding: 11px 22px;
      border-radius: 10px;
      font-size: 0.95rem;
      transition: transform 0.32s cubic-bezier(0.34, 1.4, 0.64, 1), opacity 0.32s;
      z-index: 10000;
      pointer-events: none;
      opacity: 0;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast.solved {
      background: #1e3a1e;
      border-color: #40904a;
      color: #90ee90;
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="back-btn" title="Home">←</a>
    <span class="hdr-title">KenKen</span>
    <div class="hdr-sep"></div>
    <div class="hdr-group">
      <select id="size">
        <option value="4">4×4</option>
        <option value="5">5×5</option>
        <option value="6" selected>6×6</option>
        <option value="7">7×7</option>
        <option value="8">8×8</option>
      </select>
      <button id="newGame">New Game</button>
    </div>
    <div class="hdr-sep"></div>
    <div class="hdr-group">
      <button id="undo">Undo</button>
      <button id="redo">Redo</button>
      <button id="reset">Reset</button>
    </div>
    <div class="hdr-sep"></div>
    <div class="hdr-group">
      <button id="toggleNotes">Note Mode</button>
      <button id="addAllCandidates">Fill All Candidates</button>
      <button id="randomizeColors">Randomize Colors</button>
    </div>
    <div class="hdr-spacer"></div>
    <div class="progress-wrap">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <span class="progress-label" id="progressLabel"></span>
    </div>
  </header>

  <div id="board"></div>
  <div id="numpad"></div>
  <div class="toast" id="toast"></div>

  <script>
    let notesMode = false;
    let history = [];
    let historyIndex = -1;
    let toastTimer = null;
    let wrongTimer = null;
    let solved = false;

    /* ── Candidate helpers ── */
    // Render space-separated number string as individual spans inside a candidates div
    function renderCandidates(div, text) {
      div.innerHTML = '';
      const nums = text.split(' ').filter(s => s.trim() !== '');
      nums.forEach((n, i) => {
        const span = document.createElement('span');
        span.dataset.candidate = n;
        span.textContent = n;
        div.appendChild(span);
        if (i < nums.length - 1) div.appendChild(document.createTextNode(' '));
      });
    }

    // Read candidate text back from a div (works whether spans exist or not)
    function getCandidatesText(div) {
      const spans = div.querySelectorAll('span');
      if (spans.length > 0) return Array.from(spans).map(s => s.textContent).join(' ');
      return div.textContent.trim();
    }

    /* ── Number pad ── */
    function renderNumpad(size) {
      const numpad = document.getElementById('numpad');
      numpad.innerHTML = '';
      for (let n = 1; n <= size; n++) {
        const btn = document.createElement('button');
        btn.className = 'num-btn';
        btn.textContent = n;
        btn.dataset.num = n;

        btn.addEventListener('mouseenter', () => {
          document.querySelectorAll(`.candidates span[data-candidate="${n}"]`).forEach(span => {
            span.classList.add('cand-lit');
          });
        });
        btn.addEventListener('mouseleave', () => {
          document.querySelectorAll('.candidates span.cand-lit').forEach(span => {
            span.classList.remove('cand-lit');
          });
        });

        btn.addEventListener('click', () => {
          const selectedCell = document.querySelector('.cell.selected');
          if (!selectedCell) return;
          const input = selectedCell.querySelector('input');
          const candidatesDiv = selectedCell.querySelector('.candidates');

          if (notesMode) {
            // Don't add notes to a cell that already has a value
            if (input.value.trim() !== '') return;
            let candidates = getCandidatesText(candidatesDiv).split(' ').filter(ch => ch.trim() !== '');
            const key = String(n);
            if (candidates.includes(key)) {
              candidates = candidates.filter(ch => ch !== key);
            } else {
              candidates.push(key);
              candidates.sort((a, b) => parseInt(a) - parseInt(b));
            }
            renderCandidates(candidatesDiv, candidates.join(' '));
            captureState();
          } else {
            // Normal mode: place the value
            input.value = String(n);
            renderCandidates(candidatesDiv, '');
            // Remove this candidate from row/col peers
            const row = selectedCell.dataset.row;
            const col = selectedCell.dataset.col;
            document.querySelectorAll('.cell').forEach(peer => {
              if (peer !== selectedCell && (peer.dataset.row === row || peer.dataset.col === col)) {
                const cDiv = peer.querySelector('.candidates');
                if (cDiv) {
                  const remaining = getCandidatesText(cDiv).split(' ').filter(ch => ch !== String(n) && ch.trim() !== '');
                  renderCandidates(cDiv, remaining.join(' '));
                }
              }
            });
            captureState();
          }
        });

        numpad.appendChild(btn);
      }
    }

    /* ── Toast ── */
    function showToast(message, type = '', duration = 3500) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + (type ? type + ' show' : 'show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
    }

    /* ── Progress ── */
    function updateProgress() {
      if (!window.currentPuzzle) return;
      const total = window.currentPuzzle.size ** 2;
      const filled = Array.from(document.querySelectorAll('.cell input'))
        .filter(inp => inp.value.trim() !== '').length;
      const pct = total > 0 ? (filled / total) * 100 : 0;
      const fill = document.getElementById('progressFill');
      const label = document.getElementById('progressLabel');
      fill.style.width = pct + '%';
      fill.classList.toggle('complete', filled === total);
      label.textContent = filled + '/' + total;
    }

    /* ── Auto-completion check ── */
    function checkCompletion() {
      if (solved || !window.currentPuzzle) return;
      const { size, solution } = window.currentPuzzle;
      const inputs = Array.from(document.querySelectorAll('.cell input'));
      let allFilled = true;
      let allCorrect = true;
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          const val = inputs[r * size + c].value.trim();
          if (!val) { allFilled = false; break; }
          if (parseInt(val, 10) !== solution[r][c]) allCorrect = false;
        }
        if (!allFilled) break;
      }
      if (!allFilled) return;
      if (allCorrect) {
        solved = true;
        celebrate();
        showToast('Puzzle solved!', 'solved', 6000);
      } else {
        // Briefly highlight wrong cells instead of an alert
        if (wrongTimer) return; // debounce — don't re-flash while already showing
        const cells = Array.from(document.querySelectorAll('.cell'));
        cells.forEach((cell, idx) => {
          const r = Math.floor(idx / size);
          const c = idx % size;
          const val = inputs[idx].value.trim();
          if (val && parseInt(val, 10) !== solution[r][c]) {
            cell.classList.add('wrong');
          }
        });
        wrongTimer = setTimeout(() => {
          document.querySelectorAll('.cell.wrong').forEach(c => c.classList.remove('wrong'));
          wrongTimer = null;
        }, 1800);
      }
    }

    function updateUndoRedoButtons() {
      document.getElementById('undo').disabled = historyIndex <= 0;
      document.getElementById('redo').disabled = historyIndex >= history.length - 1;
    }

    function captureState() {
      const state = [];
      document.querySelectorAll('.cell').forEach(cell => {
        const input = cell.querySelector('input');
        state.push({
          row: cell.dataset.row,
          col: cell.dataset.col,
          value: input.value,
          candidates: getCandidatesText(cell.querySelector('.candidates'))
        });
      });
      history = history.slice(0, historyIndex + 1);
      history.push(state);
      historyIndex++;
      updateUndoRedoButtons();
      updateProgress();
      checkCompletion();
    }

    function applyState(state) {
      state.forEach(item => {
        const cell = document.querySelector(`.cell[data-row='${item.row}'][data-col='${item.col}']`);
        const input = cell.querySelector('input');
        input.value = item.value;
        renderCandidates(cell.querySelector('.candidates'), item.candidates);
      });
      updateUndoRedoButtons();
      updateProgress();
    }

    // Generate a Latin square of size n
    function generateLatinSquare(n) {
      const base = Array.from({length: n}, (_, i) => i + 1);
      const grid = [];
      for (let r = 0; r < n; r++) {
        grid.push(base.map((_, c) => ((r + c) % n) + 1));
      }
      for (let i = n - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [grid[i], grid[j]] = [grid[j], grid[i]];
      }
      for (let i = n - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        for (let r = 0; r < n; r++) {
          [grid[r][i], grid[r][j]] = [grid[r][j], grid[r][i]];
        }
      }
      return grid;
    }

    function generateCages(grid) {
      const n = grid.length;
      const used = Array.from({length: n}, () => Array(n).fill(false));
      const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
      const cages = [];
      let singletons = 0;

      function neighbors(r, c) {
        return dirs.map(([dr, dc]) => [r + dr, c + dc])
          .filter(([rr, cc]) => rr >= 0 && rr < n && cc >= 0 && cc < n && !used[rr][cc]);
      }

      for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
          if (used[r][c]) continue;
          const cage = [[r, c]];
          used[r][c] = true;
          let targetSize = Math.random() < 0.8 ? (2 + Math.floor(Math.random() * 2)) : 1;
          if (targetSize === 1 && singletons >= 3) {
            targetSize = 2 + Math.floor(Math.random() * 2);
          }
          while (cage.length < targetSize) {
            const avail = cage.flatMap(([rr, cc]) => neighbors(rr, cc));
            if (!avail.length) break;
            const [nr, nc] = avail[Math.floor(Math.random() * avail.length)];
            used[nr][nc] = true;
            cage.push([nr, nc]);
          }

          const values = cage.map(([rr, cc]) => grid[rr][cc]);
          let op, target;
          if (cage.length === 1) {
            op = '';
            target = values[0];
            singletons++;
          } else {
            const sum = values.reduce((a,b) => a+b, 0);
            const prod = values.reduce((a,b) => a*b, 1);
            const [a,b] = values;
            const dif = Math.abs(a - b);
            const div = Math.max(a,b) / Math.min(a,b);
            const choices = [];
            if (cage.length === 2) {
              choices.push({op: '+', val: sum});
              choices.push({op: '×', val: prod});
              if (dif > 0) choices.push({op: '−', val: dif});
              if (Number.isInteger(div)) choices.push({op: '÷', val: div});
            } else {
              choices.push({op: '+', val: sum});
              choices.push({op: '×', val: prod});
            }
            const pick = choices[Math.floor(Math.random() * choices.length)];
            op = pick.op;
            target = pick.val;
          }
          cages.push({cells: cage, op, target});
        }
      }
      return cages;
    }

    function generatePuzzle(n) {
      const solution = generateLatinSquare(n);
      const cages = generateCages(solution);
      return { size: n, solution, cages };
    }

    // ===================== UNIQUE-SOLUTION SOLVER =====================
    function countSingletonCages(cages) {
      return cages.reduce((acc, c) => acc + (c.cells.length === 1 ? 1 : 0), 0);
    }

    function buildCageIndex(puzzle) {
      const { size, cages } = puzzle;
      const cageOf = Array.from({length: size}, () => Array(size).fill(-1));
      cages.forEach((cg, idx) => cg.cells.forEach(([r, c]) => { cageOf[r][c] = idx; }));
      return { cageOf };
    }

    function cagePartialFeasible(cage, grid, size) {
      const vals = [];
      let unassigned = 0;
      for (const [r, c] of cage.cells) {
        const v = grid[r][c];
        if (v == null) unassigned++; else vals.push(v);
      }
      const op = cage.op;
      const target = cage.target;

      const maxSum = (k) => k * size;
      const maxProd = (k) => Math.pow(size, k);

      if (cage.cells.length === 1) {
        if (unassigned === 1) return true;
        return vals[0] === target;
      }

      if (op === '+') {
        const s = vals.reduce((a,b)=>a+b,0);
        if (s > target) return false;
        if (s + maxSum(unassigned) < target) return false;
        if (unassigned === 0) return s === target;
        return true;
      }
      if (op === '×') {
        const p = vals.reduce((a,b)=>a*b,1);
        if (target % p !== 0) return false;
        if (p > target) return false;
        if (p * maxProd(unassigned) < target) return false;
        if (unassigned === 0) return p === target;
        return true;
      }
      if (op === '−') {
        if (cage.cells.length !== 2) return false;
        if (vals.length === 2) return Math.abs(vals[0]-vals[1]) === target;
        if (vals.length === 1) {
          const a = vals[0];
          const b1 = a - target;
          const b2 = a + target;
          if ((b1 >= 1 && b1 <= size) || (b2 >= 1 && b2 <= size)) return true;
          return false;
        }
        return true;
      }
      if (op === '÷') {
        if (cage.cells.length !== 2) return false;
        if (vals.length === 2) {
          const a = Math.max(vals[0], vals[1]);
          const b = Math.min(vals[0], vals[1]);
          return b !== 0 && a % b === 0 && a / b === target;
        }
        if (vals.length === 1) {
          const a = vals[0];
          for (let b = 1; b <= size; b++) {
            if ((b !== 0 && a % b === 0 && a / b === target) || (a !== 0 && b % a === 0 && b / a === target)) {
              return true;
            }
          }
          return false;
        }
        return true;
      }
      return true;
    }

    function getDomainForCell(r, c, grid, puzzle, cageOf) {
      const n = puzzle.size;
      const dom = [];
      const usedRow = new Set();
      const usedCol = new Set();
      for (let k = 0; k < n; k++) {
        if (grid[r][k] != null) usedRow.add(grid[r][k]);
        if (grid[k][c] != null) usedCol.add(grid[k][c]);
      }
      const cage = puzzle.cages[cageOf[r][c]];
      for (let v = 1; v <= n; v++) {
        if (usedRow.has(v) || usedCol.has(v)) continue;
        grid[r][c] = v;
        if (cagePartialFeasible(cage, grid, n)) dom.push(v);
        grid[r][c] = null;
      }
      return dom;
    }

    function countSolutions(puzzle, limit=2) {
      const n = puzzle.size;
      const grid = Array.from({length: n}, () => Array(n).fill(null));
      const { cageOf } = buildCageIndex(puzzle);

      function selectMRV() {
        let best = null;
        let bestDom = null;
        for (let r = 0; r < n; r++) {
          for (let c = 0; c < n; c++) {
            if (grid[r][c] == null) {
              const dom = getDomainForCell(r, c, grid, puzzle, cageOf);
              if (dom.length === 0) return { r, c, dom };
              if (!best || dom.length < bestDom.length) {
                best = { r, c };
                bestDom = dom;
                if (dom.length === 1) return { r, c, dom };
              }
            }
          }
        }
        return best ? { ...best, dom: bestDom } : null;
      }

      let solutions = 0;
      function backtrack() {
        if (solutions >= limit) return;
        const pick = selectMRV();
        if (!pick) { solutions++; return; }
        const { r, c, dom } = pick;
        for (const v of dom) {
          grid[r][c] = v;
          backtrack();
          if (solutions >= limit) return;
          grid[r][c] = null;
        }
      }

      backtrack();
      return solutions;
    }

    function createUniquePuzzle(n) {
      let attempts = 0;
      while (attempts < 200) {
        attempts++;
        const candidate = generatePuzzle(n);
        if (countSingletonCages(candidate.cages) > 3) continue;
        const solCount = countSolutions(candidate, 2);
        if (solCount === 1) return candidate;
      }
      return generatePuzzle(n);
    }
    // =================== END UNIQUE-SOLUTION SOLVER ====================

    document.getElementById('toggleNotes').addEventListener('click', () => {
      notesMode = !notesMode;
      const btn = document.getElementById('toggleNotes');
      btn.textContent = 'Note Mode';
      btn.classList.toggle('btn-active', notesMode);
      if (notesMode) {
        document.querySelectorAll('.cell').forEach(cell => cell.style.boxShadow = '');
        document.querySelectorAll('.cell.selected').forEach(cell => cell.classList.remove('selected'));
      } else {
        document.querySelectorAll('.cell.selected').forEach(cell => {
          cell.style.boxShadow = "0 0 10px 4px yellow";
        });
      }
    });

    function renderPuzzle(puzzle) {
      solved = false;
      history = [];
      historyIndex = -1;
      const { size, cages } = puzzle;
      const board = document.getElementById('board');
      board.innerHTML = '';
      board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
      board.style.width = `${size * 60}px`;
      board.style.height = `${size * 60}px`;

      const map = Array.from({length: size}, () => Array(size).fill(null));
      cages.forEach((c, i) =>
        c.cells.forEach(([r, cx]) => map[r][cx] = i)
      );

      cages.forEach(cage => {
        cage.minCell = cage.cells.reduce((min, cell) => {
          if (!min) return cell;
          const [r1, c1] = min;
          const [r2, c2] = cell;
          return (r2 < r1 || (r2 === r1 && c2 < c1)) ? cell : min;
        }, null);
      });

      const adjacency = cages.map(() => new Set());
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          const current = map[r][c];
          const neighbors = [[r-1, c], [r+1, c], [r, c-1], [r, c+1]];
          neighbors.forEach(([nr, nc]) => {
            if(nr >= 0 && nr < size && nc >= 0 && nc < size) {
              const neighborCage = map[nr][nc];
              if(neighborCage !== current) {
                adjacency[current].add(neighborCage);
              }
            }
          });
        }
      }

      const order = [...Array(cages.length).keys()].sort((a, b) => adjacency[b].size - adjacency[a].size);

      function generateRandomColor() {
        return '#' + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0');
      }

      const defaultPalette = ["#f28b82", "#fbbc04", "#fff475", "#ccff90", "#a7ffeb", "#cbf0f8", "#aecbfa", "#d7aefb", "#fdcfe8", "#e6c9a8"];
      let persistentPalette = (window.lastColorScheme && window.lastColorScheme.length) ? window.lastColorScheme.slice() : defaultPalette.slice();

      order.forEach(i => {
        const used = new Set();
        adjacency[i].forEach(j => {
          if(cages[j].cageColor) used.add(cages[j].cageColor);
        });
        let chosen = persistentPalette.find(color => !used.has(color));
        if(!chosen) {
          chosen = generateRandomColor();
          persistentPalette.push(chosen);
        }
        cages[i].cageColor = chosen;
      });
      window.lastColorScheme = persistentPalette;

      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.row = r;
          cell.dataset.col = c;
          const currentCage = map[r][c];
          cell.dataset.cage = currentCage;
          cell.style.background = cages[currentCage].cageColor;

          const topWidth = (r === 0 || map[r - 1][c] !== currentCage) ? '2px' : '1px';
          const leftWidth = (c === 0 || map[r][c - 1] !== currentCage) ? '2px' : '1px';
          const bottomWidth = (r === size - 1 || map[r + 1][c] !== currentCage) ? '2px' : '1px';
          const rightWidth = (c === size - 1 || map[r][c + 1] !== currentCage) ? '2px' : '1px';
          cell.style.borderTop = `${topWidth} solid var(--border)`;
          cell.style.borderLeft = `${leftWidth} solid var(--border)`;
          cell.style.borderBottom = `${bottomWidth} solid var(--border)`;
          cell.style.borderRight = `${rightWidth} solid var(--border)`;

          const cage = cages[currentCage];
          if (r === cage.minCell[0] && c === cage.minCell[1]) {
            const label = document.createElement('div');
            label.className = 'cage-label';
            label.textContent = `${cage.target}${cage.op}`;
            label.addEventListener('click', e => e.stopPropagation());
            cell.appendChild(label);
          }

          const input = document.createElement('input');
          input.setAttribute('type', 'number');
          input.setAttribute('min', '1');
          input.setAttribute('max', size.toString());
          input.addEventListener('keydown', (e) => {
            if (e.metaKey || e.ctrlKey) return;
            const allowedKeys = ["Backspace", "ArrowLeft", "ArrowRight", "Delete", "Tab"];
            if (allowedKeys.includes(e.key)) return;
            if (notesMode) {
              if (input.value.trim() !== "") {
                e.preventDefault();
                return;
              }
              if (/^[1-9]$/.test(e.key) && parseInt(e.key, 10) <= size) {
                e.preventDefault();
                const candidatesDiv = cell.querySelector('.candidates');
                let candidates = getCandidatesText(candidatesDiv).split(' ').filter(ch => ch.trim().length > 0);
                if (candidates.includes(e.key)) {
                  candidates = candidates.filter(ch => ch !== e.key);
                } else {
                  candidates.push(e.key);
                  candidates.sort((a, b) => parseInt(a) - parseInt(b));
                }
                renderCandidates(candidatesDiv, candidates.join(' '));
                captureState();
              } else {
                e.preventDefault();
              }
            } else {
              if (/^[1-9]$/.test(e.key) && parseInt(e.key, 10) <= size) {
                e.preventDefault();
                input.value = e.key;
                renderCandidates(cell.querySelector('.candidates'), '');
                const row = cell.dataset.row;
                const col = cell.dataset.col;
                document.querySelectorAll('.cell').forEach(peer => {
                  if (peer !== cell && (peer.dataset.row === row || peer.dataset.col === col)) {
                    const cDiv = peer.querySelector('.candidates');
                    if (cDiv) {
                      const newCandidates = getCandidatesText(cDiv).split(' ').filter(ch => ch !== e.key && ch.trim() !== '');
                      renderCandidates(cDiv, newCandidates.join(' '));
                    }
                  }
                });
                captureState();
              } else {
                e.preventDefault();
              }
            }
          });
          cell.appendChild(input);

          const candidatesDiv = document.createElement('div');
          candidatesDiv.className = 'candidates';
          cell.appendChild(candidatesDiv);

          cell.addEventListener('click', (e) => {
            const board = document.getElementById('board');
            board.querySelectorAll('.cell.selected').forEach(c => {
              c.classList.remove('selected');
              c.style.boxShadow = '';
            });
            cell.classList.add('selected');
            if (!notesMode) {
              cell.style.boxShadow = "0 0 10px 4px yellow";
            }
            const inputEl = cell.querySelector('input');
            if (inputEl) inputEl.focus();
          });

          board.appendChild(cell);
        }
      }

      // capture initial state (don't trigger checkCompletion on fresh board)
      const state = [];
      document.querySelectorAll('.cell').forEach(cell => {
        const input = cell.querySelector('input');
        state.push({
          row: cell.dataset.row,
          col: cell.dataset.col,
          value: input.value,
          candidates: getCandidatesText(cell.querySelector('.candidates'))
        });
      });
      history.push(state);
      historyIndex = 0;
      updateUndoRedoButtons();
      updateProgress();
      renderNumpad(size);
    }

    // Confetti celebration
    function celebrate() {
      const canvas = document.createElement("canvas");
      canvas.style.cssText = "position:fixed;top:0;left:0;pointer-events:none;z-index:9999;";
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      document.body.appendChild(canvas);
      const ctx = canvas.getContext("2d");

      const COLORS = ["#f28b82","#fbbc04","#fff475","#ccff90","#a7ffeb","#cbf0f8","#aecbfa","#d7aefb","#ff9de2","#ffd6a5"];
      const TOTAL = 160;
      const DURATION = 5500; // ms
      const start = performance.now();

      // Burst origins — two cannon points near bottom corners
      const origins = [
        { x: canvas.width * 0.2, y: canvas.height },
        { x: canvas.width * 0.8, y: canvas.height },
      ];

      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      // Each piece: rectangle or circle, launched upward with gravity + drag
      const pieces = Array.from({ length: TOTAL }, (_, i) => {
        const origin = origins[i % origins.length];
        const angle = rand(-Math.PI * 0.9, -Math.PI * 0.1); // upward arc
        const speed = rand(600, 1200); // px/s
        const isRect = Math.random() > 0.35;
        return {
          x: origin.x + rand(-18, 18),
          y: origin.y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          w: isRect ? rand(7, 14) : rand(5, 10),
          h: isRect ? rand(4, 8)  : null,
          rot: rand(0, Math.PI * 2),
          rotV: rand(-6, 6),       // rad/s
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          isRect,
          drag: rand(0.88, 0.96),  // per-second exponential drag factor
          wobble: rand(0, Math.PI * 2),
          wobbleV: rand(2, 5),
        };
      });

      const GRAVITY = 1400; // px/s²

      let lastT = start;
      let raf;

      function frame(now) {
        const dt = Math.min((now - lastT) / 1000, 0.05);
        lastT = now;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (const p of pieces) {
          const dragFactor = Math.pow(p.drag, dt);
          p.vx *= dragFactor;
          p.vy = p.vy * dragFactor + GRAVITY * dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.rot += p.rotV * dt;
          p.wobble += p.wobbleV * dt;

          if (p.y > canvas.height + 40) continue;

          // Shimmer — tumbling pieces catch light
          const shimmer = 0.65 + 0.35 * Math.abs(Math.sin(p.wobble));
          ctx.globalAlpha = shimmer;
          ctx.fillStyle = p.color;

          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);

          if (p.isRect) {
            const scaleY = Math.abs(Math.cos(p.wobble));
            ctx.scale(1, Math.max(0.15, scaleY));
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          } else {
            ctx.beginPath();
            ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.restore();
        }

        ctx.globalAlpha = 1;
        raf = requestAnimationFrame(frame);
      }

      raf = requestAnimationFrame(frame);

      // Fade the canvas element out with a CSS transition, then clean up
      const FADE = 1200;
      setTimeout(() => {
        canvas.style.transition = `opacity ${FADE}ms ease-out`;
        canvas.style.opacity = '0';
      }, DURATION - FADE);
      setTimeout(() => {
        cancelAnimationFrame(raf);
        canvas.remove();
      }, DURATION);
    }

    // Event hookups
    document.getElementById('newGame').addEventListener('click', () => {
      const n = parseInt(document.getElementById('size').value, 10);
      window.currentPuzzle = createUniquePuzzle(n);
      renderPuzzle(window.currentPuzzle);
    });

    document.getElementById('reset').addEventListener('click', () => {
      renderPuzzle(window.currentPuzzle);
    });

    document.getElementById('randomizeColors').addEventListener('click', () => {
      const palette = ["#f28b82", "#fbbc04", "#fff475", "#ccff90", "#a7ffeb", "#cbf0f8", "#aecbfa", "#d7aefb", "#fdcfe8", "#e6c9a8"];

      function hexToRgb(hex) {
        hex = hex.replace("#", "");
        return { r: parseInt(hex.substring(0,2),16), g: parseInt(hex.substring(2,4),16), b: parseInt(hex.substring(4,6),16) };
      }
      function colorDistance(h1, h2) {
        const c1 = hexToRgb(h1), c2 = hexToRgb(h2);
        return Math.sqrt((c1.r-c2.r)**2 + (c1.g-c2.g)**2 + (c1.b-c2.b)**2);
      }
      function isSimilar(c1, c2, t=50) { return colorDistance(c1,c2) < t; }
      function shuffle(arr) {
        for (let i = arr.length-1; i > 0; i--) {
          const j = Math.floor(Math.random()*(i+1));
          [arr[i],arr[j]] = [arr[j],arr[i]];
        }
      }

      let shuffledPalette = palette.slice();
      shuffle(shuffledPalette);

      const cages = window.currentPuzzle.cages;
      const size = window.currentPuzzle.size;
      const cellMap = Array.from({length: size}, () => Array(size).fill(null));
      cages.forEach((c, i) => c.cells.forEach(([r, cx]) => cellMap[r][cx] = i));
      const adjacency = cages.map(() => new Set());
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          const current = cellMap[r][c];
          [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc]) => {
            if(nr>=0&&nr<size&&nc>=0&&nc<size) {
              const neighbor = cellMap[nr][nc];
              if(neighbor!==current) adjacency[current].add(neighbor);
            }
          });
        }
      }

      const order = [...Array(cages.length).keys()].sort((a,b) => adjacency[b].size - adjacency[a].size);
      order.forEach(i => {
        let chosenColor = null;
        for (let color of shuffledPalette) {
          let conflict = false;
          adjacency[i].forEach(adj => {
            if(cages[adj].cageColor && isSimilar(cages[adj].cageColor, color)) conflict = true;
          });
          if(!conflict) { chosenColor = color; break; }
        }
        if(!chosenColor) chosenColor = shuffledPalette[Math.floor(Math.random()*shuffledPalette.length)];
        cages[i].cageColor = chosenColor;
      });

      Array.from(document.getElementById('board').children).forEach(cell => {
        const idx = cell.dataset.cage;
        if(idx !== undefined) cell.style.background = window.currentPuzzle.cages[idx].cageColor;
      });
      window.lastColorScheme = window.currentPuzzle.cages.map(c => c.cageColor);
    });

    // Global space bar toggle for notes mode
    document.addEventListener('keydown', (e) => {
      if (e.key === ' ' && !e.metaKey && !e.ctrlKey && !e.altKey) {
        e.preventDefault();
        notesMode = !notesMode;
        const btn = document.getElementById('toggleNotes');
        btn.textContent = 'Note Mode';
        btn.classList.toggle('btn-active', notesMode);
        document.querySelectorAll('.cell.selected').forEach(cell => {
          cell.style.boxShadow = notesMode ? "" : "0 0 10px 4px yellow";
        });
        document.body.style.cursor = 'default';
      }
    });

    document.getElementById('addAllCandidates').addEventListener('click', () => {
      const size = window.currentPuzzle.size;
      const candidateStr = Array.from({length: size}, (_, i) => (i+1).toString()).join(' ');
      document.querySelectorAll('.cell').forEach(cell => {
        const input = cell.querySelector('input');
        if (input && input.value.trim() === "") {
          const candidatesDiv = cell.querySelector('.candidates');
          if (candidatesDiv) renderCandidates(candidatesDiv, candidateStr);
        }
      });
      captureState();
    });

    document.getElementById('undo').addEventListener('click', () => {
      if (historyIndex > 0) {
        historyIndex--;
        applyState(history[historyIndex]);
      }
    });
    document.getElementById('redo').addEventListener('click', () => {
      if (historyIndex < history.length - 1) {
        historyIndex++;
        applyState(history[historyIndex]);
      }
    });

    // init
    document.getElementById('newGame').click();
  </script>
</body>
